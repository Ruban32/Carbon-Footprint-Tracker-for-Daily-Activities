<!DOCTYPE html>
<html>
<head>
    <title>Carbon Footprint Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Carbon Footprint Tracker</h1>

        <label>Travel Distance (km):</label>
        <input type="number" id="travel">

        <label>Electricity Usage (kWh):</label>
        <input type="number" id="electricity">

        <label>Water Usage (Liters):</label>
        <input type="number" id="water">

        <button onclick="calculate()">Calculate Carbon Footprint</button>

        <h2 id="result"></h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
